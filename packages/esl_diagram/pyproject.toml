[build-system]
requires = ["setuptools>=61", "wheel", "setuptools_scm"]
build-backend = "setuptools.build_meta"

[project]
name = "esl-diagram"
#version = "1.3.1.45"
dynamic = ["version"]
description = "Diagraming canvas package used in ESL-Studio."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE*", "THIRD-PARTY-LICENSE*"]
authors = [{name = "Ryllan J E Kraft", email = "Ryllan.Kraft@gmail.com"}]
dependencies = [
  "wxPython>=4.2.0",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Development Status :: 4 - Beta",
    #"Development Status :: 5 - Production/Stable",
    "Intended Audience :: End Users/Desktop",
    "Topic :: Scientific/Engineering :: Mathematics",
]

[project.urls]
Repository = "https://github.com/ryllank/ryllank/esl-studio.git"
Homepage = "https://ryllank.github.io/esl-studio/"
Documentation = "https://ryllank.github.io/esl-studio/"
ESL_Software = "https://isimsimulation.com/"

#[project.optional-dependencies]
#dev = [
#  "pytest>=7.0",
#  "twine",    # for publishing
#]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
# Common options:
# - write_to: write a small file containing version (so runtime import doesn't need git)
# - version_scheme: "post-release" or "guess-next-dev" (see below)
# - local_scheme: "node-and-date", "no-local-version", "dirty-tag", etc.
version_file = "src/esl_diagram/_version.py"
version_scheme = "post-release"
local_scheme = "no-local-version"
root = "../.."
# optional fallback when git is not available (CI source tarball builds)
fallback_version = "0.0.0.0+unknown"
version_file_template = """\
# ESL-Studio version file - _version.py
# Generated by setuptools-scm
# Don't change, don't track in version control

# from standard template for the __ vars
__all__ = [
    "__version__",
    "__version_tuple__",
    "__commit_id__",
    "version",
]

TYPE_CHECKING = False
if TYPE_CHECKING:
    from typing import Tuple
    from typing import Union

    VERSION_TUPLE = Tuple[Union[int, str], ...]
    COMMIT_ID = Union[str, None]
else:
    VERSION_TUPLE = object
    COMMIT_ID = object

__version__: str
__version_tuple__: VERSION_TUPLE
__commit_id__: COMMIT_ID

__version__ = {version!r}
__version_tuple__ = version_tuple = {version_tuple!r}
__commit_id__ = {scm_version.short_node!r}

# for 'version' and extra: 'build_time'
version:str
build_time:str

version = {version!r}
build_time = '{scm_version.time.year}-{scm_version.time.month:02}-{scm_version.time.day:02} {scm_version.time.hour:02}:{scm_version.time.minute:02}'\

"""
